name: delivit
description: A new Flutter project.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Core
  supabase_flutter: ^2.3.0
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1
  firebase_database: ^12.1.3
  
  # Maps & Location
  google_maps_flutter: ^2.5.3
  geolocator: ^10.1.0
  permission_handler: ^11.3.0
  
  # UI/Assets
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  animate_do: ^3.3.2
  gap: ^3.0.0
  image_picker: ^1.0.7
  google_sign_in: ^6.2.1
  
  # Utilities
  intl: ^0.19.0
  go_router: ^13.0.0
  uuid: ^4.2.0
  timeago: ^3.6.1
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  custom_lint: ^0.6.2
  riverpod_lint: ^2.3.8
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_logo.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icons/app_logo.png"
    background_color: "#F8F9FA"
    theme_color: "#4A90E2"

flutter_native_splash:
  color: "#F8F9FA"
  image: "assets/icons/app_logo.png"
  android_12:
    image: "assets/icons/app_logo.png"
    color: "#F8F9FA"
  fullscreen: true
